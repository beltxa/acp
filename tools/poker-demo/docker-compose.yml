services:
  dealer:
    build:
      context: ../..
      dockerfile: tools/poker-demo/dealer/Dockerfile
    container_name: acp-poker-dealer
    environment:
      VAADIN_PRODUCTION_MODE: "true"
      SERVER_PORT: "8090"
      POKER_DEALER_TRANSPORT_MODE: "ACP"
      POKER_DEALER_LOCAL_AGENT_ID: "agent:dealer@dealer:8090"
      POKER_DEALER_PUBLIC_BASE_URL: "http://dealer:8090"
      POKER_DEALER_ACP_DISCOVERY_SCHEME: "http"
      POKER_DEALER_ACP_ALLOW_INSECURE_HTTP: "true"
      POKER_DEALER_ACP_DELIVERY_MODE: "direct"
      POKER_PLAYER1_AGENT_ID: "agent:player1@player1:8091"
      POKER_PLAYER2_AGENT_ID: "agent:player2@player2:8092"
      POKER_PLAYER3_AGENT_ID: "agent:player3@player3:8093"
      POKER_PLAYER4_AGENT_ID: "agent:player4@player4:8094"
      POKER_DEALER_AUTH_ENABLED: "true"
      POKER_DEALER_AUTH_USERNAME: "local-admin"
      POKER_DEALER_AUTH_PASSWORD: "poker-dealer-admin-pass"
    ports:
      - "8090:8090"
    depends_on:
      - player1
      - player2
      - player3
      - player4
    volumes:
      - poker_dealer_data:/var/lib/poker-dealer

  player1:
    build:
      context: ../..
      dockerfile: tools/poker-demo/player/Dockerfile
    container_name: acp-poker-player1
    environment:
      SERVER_PORT: "8091"
      POKER_PLAYER_TRANSPORT_MODE: "ACP"
      POKER_PLAYER_PLAYER_ID: "Player-1"
      POKER_PLAYER_LOCAL_AGENT_ID: "agent:player1@player1:8091"
      POKER_PLAYER_DEALER_AGENT_ID: "agent:dealer@dealer:8090"
      POKER_PLAYER_PUBLIC_BASE_URL: "http://player1:8091"
      POKER_PLAYER_ACP_DISCOVERY_SCHEME: "http"
      POKER_PLAYER_ACP_ALLOW_INSECURE_HTTP: "true"
      POKER_PLAYER_ACP_DELIVERY_MODE: "direct"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "8091:8091"
    volumes:
      - poker_player1_data:/var/lib/poker-player

  player2:
    build:
      context: ../..
      dockerfile: tools/poker-demo/player/Dockerfile
    container_name: acp-poker-player2
    environment:
      SERVER_PORT: "8092"
      POKER_PLAYER_TRANSPORT_MODE: "ACP"
      POKER_PLAYER_PLAYER_ID: "Player-2"
      POKER_PLAYER_LOCAL_AGENT_ID: "agent:player2@player2:8092"
      POKER_PLAYER_DEALER_AGENT_ID: "agent:dealer@dealer:8090"
      POKER_PLAYER_PUBLIC_BASE_URL: "http://player2:8092"
      POKER_PLAYER_ACP_DISCOVERY_SCHEME: "http"
      POKER_PLAYER_ACP_ALLOW_INSECURE_HTTP: "true"
      POKER_PLAYER_ACP_DELIVERY_MODE: "direct"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "8092:8092"
    volumes:
      - poker_player2_data:/var/lib/poker-player

  player3:
    build:
      context: ../..
      dockerfile: tools/poker-demo/player/Dockerfile
    container_name: acp-poker-player3
    environment:
      SERVER_PORT: "8093"
      POKER_PLAYER_TRANSPORT_MODE: "ACP"
      POKER_PLAYER_PLAYER_ID: "Player-3"
      POKER_PLAYER_LOCAL_AGENT_ID: "agent:player3@player3:8093"
      POKER_PLAYER_DEALER_AGENT_ID: "agent:dealer@dealer:8090"
      POKER_PLAYER_PUBLIC_BASE_URL: "http://player3:8093"
      POKER_PLAYER_ACP_DISCOVERY_SCHEME: "http"
      POKER_PLAYER_ACP_ALLOW_INSECURE_HTTP: "true"
      POKER_PLAYER_ACP_DELIVERY_MODE: "direct"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "8093:8093"
    volumes:
      - poker_player3_data:/var/lib/poker-player

  player4:
    build:
      context: ../..
      dockerfile: tools/poker-demo/player/Dockerfile
    container_name: acp-poker-player4
    environment:
      SERVER_PORT: "8094"
      POKER_PLAYER_TRANSPORT_MODE: "ACP"
      POKER_PLAYER_PLAYER_ID: "Player-4"
      POKER_PLAYER_LOCAL_AGENT_ID: "agent:player4@player4:8094"
      POKER_PLAYER_DEALER_AGENT_ID: "agent:dealer@dealer:8090"
      POKER_PLAYER_PUBLIC_BASE_URL: "http://player4:8094"
      POKER_PLAYER_ACP_DISCOVERY_SCHEME: "http"
      POKER_PLAYER_ACP_ALLOW_INSECURE_HTTP: "true"
      POKER_PLAYER_ACP_DELIVERY_MODE: "direct"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "8094:8094"
    volumes:
      - poker_player4_data:/var/lib/poker-player

volumes:
  poker_dealer_data:
  poker_player1_data:
  poker_player2_data:
  poker_player3_data:
  poker_player4_data:
