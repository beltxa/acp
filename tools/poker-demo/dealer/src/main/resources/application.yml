server:
  port: 8090
  servlet:
    session:
      cookie:
        name: ${POKER_DEALER_SESSION_COOKIE_NAME:POKER_DEALER_SESSION}
        same-site: ${POKER_DEALER_SESSION_COOKIE_SAME_SITE:Lax}

spring:
  application:
    name: poker-demo-dealer

poker:
  dealer:
    auth:
      enabled: ${POKER_DEALER_AUTH_ENABLED:true}
      username: ${POKER_DEALER_AUTH_USERNAME:local-admin}
      password: ${POKER_DEALER_AUTH_PASSWORD:poker-dealer-admin-pass}
    transport-mode: ${POKER_DEALER_TRANSPORT_MODE:ACP}
    table-id: table-1
    starting-stack: ${POKER_DEALER_STARTING_STACK:100}
    small-blind: 5
    big-blind: 10
    ante: ${POKER_DEALER_ANTE:5}
    spectator-delay-millis: ${POKER_DEALER_SPECTATOR_DELAY_MILLIS:1500}
    action-timeout-millis: ${POKER_DEALER_ACTION_TIMEOUT_MILLIS:15000}
    seat-count: ${POKER_DEALER_SEAT_COUNT:4}
    demo-visibility-mode: true
    max-hands: ${POKER_DEALER_MAX_HANDS:200}
    local-agent-id: ${POKER_DEALER_LOCAL_AGENT_ID:agent:dealer@localhost:8090}
    public-base-url: ${POKER_DEALER_PUBLIC_BASE_URL:http://localhost:8090}
    acp-message-path: ${POKER_DEALER_ACP_MESSAGE_PATH:/api/v1/acp/messages}
    acp-storage-dir: ${POKER_DEALER_ACP_STORAGE_DIR:/var/lib/poker-dealer/acp}
    acp-discovery-scheme: ${POKER_DEALER_ACP_DISCOVERY_SCHEME:http}
    acp-relay-url: ${POKER_DEALER_ACP_RELAY_URL:}
    acp-delivery-mode: ${POKER_DEALER_ACP_DELIVERY_MODE:direct}
    acp-poll-interval-millis: ${POKER_DEALER_ACP_POLL_INTERVAL_MILLIS:100}
    invite-timeout-millis: ${POKER_DEALER_INVITE_TIMEOUT_MILLIS:20000}
    coordinator-base-url: ${POKER_DEALER_COORDINATOR_BASE_URL:https://coordinator-a:8082}
    insecure-tls: ${POKER_DEALER_INSECURE_TLS:true}
    participant-urn: ${POKER_DEALER_PARTICIPANT_URN:urn:co-operator:entity:000005}
    user-urn: ${POKER_DEALER_USER_URN:urn:cooperate:dealer:00001}
    business-profile: ${POKER_DEALER_BUSINESS_PROFILE:co-operate:poker}
    correlation-id-prefix: ${POKER_DEALER_CORRELATION_PREFIX:poker}
    ucw-poll-interval-millis: 1200
    ucw-invite-join-timeout-millis: 25000
    ucw-closure-timeout-millis: 60000
    player-ucw:
      Player-1:
        participant-urn: ${POKER_PLAYER1_PARTICIPANT_URN:urn:co-operator:entity:000001}
      Player-2:
        participant-urn: ${POKER_PLAYER2_PARTICIPANT_URN:urn:co-operator:entity:000002}
      Player-3:
        participant-urn: ${POKER_PLAYER3_PARTICIPANT_URN:urn:co-operator:entity:000003}
      Player-4:
        participant-urn: ${POKER_PLAYER4_PARTICIPANT_URN:urn:co-operator:entity:000004}
    player-agent-ids:
      Player-1: ${POKER_PLAYER1_AGENT_ID:agent:player1@localhost:8091}
      Player-2: ${POKER_PLAYER2_AGENT_ID:agent:player2@localhost:8092}
      Player-3: ${POKER_PLAYER3_AGENT_ID:agent:player3@localhost:8093}
      Player-4: ${POKER_PLAYER4_AGENT_ID:agent:player4@localhost:8094}
    player-endpoints:
      Player-1: ${POKER_PLAYER1_ENDPOINT:http://localhost:8091}
      Player-2: ${POKER_PLAYER2_ENDPOINT:http://localhost:8092}
      Player-3: ${POKER_PLAYER3_ENDPOINT:http://localhost:8093}
      Player-4: ${POKER_PLAYER4_ENDPOINT:http://localhost:8094}
