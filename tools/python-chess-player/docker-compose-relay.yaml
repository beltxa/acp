services:
  relay:
    image: python:3.12-slim
    container_name: acp-python-relay
    working_dir: /app/relay-dev
    command: >
      sh -c "pip install --no-cache-dir fastapi uvicorn requests &&
      python /app/relay-dev/app.py"
    environment:
      ACP_DISCOVERY_SCHEME: "http"
      ACP_RELAY_PORT: "8080"
      ACP_RELAY_STORE_AND_FORWARD: "true"
      ACP_RELAY_RETRY_INTERVAL_SECONDS: "1"
      ACP_RELAY_MAX_RETRY_ATTEMPTS: "5"
      ACP_RELAY_RETRY_BACKOFF_SECONDS: "1"
    ports:
      - "8080:8080"
    volumes:
      - ../../relay-dev:/app/relay-dev:ro

  player1:
    build:
      context: ../..
      dockerfile: tools/python-chess-player/Dockerfile
    container_name: acp-python-chess-player1
    depends_on:
      - relay
    environment:
      CHESS_AGENT_SERVER_PORT: "8088"
      CHESS_AGENT_ROLE: "INITIATOR"
      CHESS_AGENT_COLOR: "WHITE"
      CHESS_AGENT_LOCAL_AGENT_ID: "agent:player1"
      CHESS_AGENT_REMOTE_AGENT_ID: "agent:player2"
      CHESS_AGENT_LOCAL_DISPLAY_NAME: "Player 1 AI"
      CHESS_AGENT_REMOTE_DISPLAY_NAME: "Player 2 AI"
      CHESS_AGENT_PUBLIC_BASE_URL: "http://player1:8088"
      CHESS_AGENT_ACP_DISCOVERY_SCHEME: "http"
      CHESS_AGENT_ACP_ALLOW_INSECURE_HTTP: "true"
      CHESS_AGENT_ACP_RELAY_URL: "http://relay:8080"
      CHESS_AGENT_ACP_DELIVERY_MODE: "relay"
      CHESS_AGENT_MOVE_SEND_DELAY_MS: "500"
      CHESS_AGENT_POLL_INTERVAL_MS: "500"
      CHESS_AGENT_PGN_EXPORT_DIR: "/var/lib/chess-agent/pgn"
      CHESS_AGENT_STATE_FILE: "/var/lib/chess-agent/state/matches.json"
    ports:
      - "8088:8088"
    volumes:
      - python_chess_player1_data:/var/lib/chess-agent

  player2:
    build:
      context: ../..
      dockerfile: tools/python-chess-player/Dockerfile
    container_name: acp-python-chess-player2
    depends_on:
      - relay
    environment:
      CHESS_AGENT_SERVER_PORT: "8089"
      CHESS_AGENT_ROLE: "RESPONDER"
      CHESS_AGENT_COLOR: "BLACK"
      CHESS_AGENT_LOCAL_AGENT_ID: "agent:player2"
      CHESS_AGENT_REMOTE_AGENT_ID: "agent:player1"
      CHESS_AGENT_LOCAL_DISPLAY_NAME: "Player 2 AI"
      CHESS_AGENT_REMOTE_DISPLAY_NAME: "Player 1 AI"
      CHESS_AGENT_PUBLIC_BASE_URL: "http://player2:8089"
      CHESS_AGENT_ACP_DISCOVERY_SCHEME: "http"
      CHESS_AGENT_ACP_ALLOW_INSECURE_HTTP: "true"
      CHESS_AGENT_ACP_RELAY_URL: "http://relay:8080"
      CHESS_AGENT_ACP_DELIVERY_MODE: "relay"
      CHESS_AGENT_MOVE_SEND_DELAY_MS: "500"
      CHESS_AGENT_POLL_INTERVAL_MS: "500"
      CHESS_AGENT_PGN_EXPORT_DIR: "/var/lib/chess-agent/pgn"
      CHESS_AGENT_STATE_FILE: "/var/lib/chess-agent/state/matches.json"
    ports:
      - "8089:8089"
    volumes:
      - python_chess_player2_data:/var/lib/chess-agent

  relay-bootstrap:
    image: curlimages/curl:8.12.1
    container_name: acp-python-relay-bootstrap
    depends_on:
      - relay
      - player1
      - player2
    command: >
      sh -c '
      set -eu;
      until curl -fsS http://relay:8080/health >/dev/null; do sleep 1; done;
      until curl -fsS http://player1:8088/api/v1/acp/identity >/dev/null; do sleep 1; done;
      until curl -fsS http://player2:8089/api/v1/acp/identity >/dev/null; do sleep 1; done;
      payload1=$$(curl -fsS http://player1:8088/api/v1/acp/identity);
      payload2=$$(curl -fsS http://player2:8089/api/v1/acp/identity);
      curl -fsS -X POST http://relay:8080/identities -H "Content-Type: application/json" -d "$$payload1" >/dev/null;
      curl -fsS -X POST http://relay:8080/identities -H "Content-Type: application/json" -d "$$payload2" >/dev/null;
      echo "ACP identities registered with relay";
      '
    restart: "no"

volumes:
  python_chess_player1_data:
  python_chess_player2_data:
