
<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">
<style>
.box { fill:#ffffff; stroke:#222; stroke-width:2; }
.layer { fill:#e6f0ff; stroke:#222; stroke-width:2; }
.text { font-family:Arial, sans-serif; font-size:18px; }
.title { font-family:Arial, sans-serif; font-size:28px; font-weight:bold; }
</style>

<text x="600" y="40" text-anchor="middle" class="title">
ACP Architecture &amp; Adoption Model
</text>

<!-- Enterprise Key Layer -->
<rect x="350" y="80" width="500" height="90" class="layer"/>
<text x="600" y="120" text-anchor="middle" class="text">
Enterprise Key &amp; Certificate Management
</text>
<text x="600" y="145" text-anchor="middle" class="text">
Vault • KMS • PKI
</text>

<!-- ACP Runtime -->
<rect x="300" y="200" width="600" height="110" class="layer"/>
<text x="600" y="240" text-anchor="middle" class="text">
ACP Agent Runtime
</text>
<text x="600" y="265" text-anchor="middle" class="text">
Agent Identity • Message Security • Encryption • Signing
</text>

<!-- Discovery -->
<rect x="420" y="340" width="360" height="80" class="box"/>
<text x="600" y="380" text-anchor="middle" class="text">
Discovery / Registry
</text>
<text x="600" y="405" text-anchor="middle" class="text">
Identity → Endpoint Mapping
</text>

<!-- Transport -->
<rect x="200" y="450" width="800" height="100" class="box"/>
<text x="600" y="490" text-anchor="middle" class="text">
Transport Layer
</text>
<text x="600" y="515" text-anchor="middle" class="text">
HTTP(S) • Relay • AMQP • MQTT • Future: Kafka / P2P
</text>

<!-- Overlay Mode -->
<rect x="150" y="580" width="350" height="90" class="box"/>
<text x="325" y="615" text-anchor="middle" class="text">
Overlay Mode
</text>
<text x="325" y="640" text-anchor="middle" class="text">
Existing systems + ACP envelope
</text>

<!-- Native Mode -->
<rect x="700" y="580" width="350" height="90" class="box"/>
<text x="875" y="615" text-anchor="middle" class="text">
Native ACP Mode
</text>
<text x="875" y="640" text-anchor="middle" class="text">
Agents • Discovery • Relay Network
</text>

<!-- connecting lines -->
<line x1="600" y1="170" x2="600" y2="200" stroke="black"/>
<line x1="600" y1="310" x2="600" y2="340" stroke="black"/>
<line x1="600" y1="420" x2="600" y2="450" stroke="black"/>
<line x1="450" y1="550" x2="325" y2="580" stroke="black"/>
<line x1="750" y1="550" x2="875" y2="580" stroke="black"/>

