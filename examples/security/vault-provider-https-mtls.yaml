# ACP enterprise profile example: Vault key provider + HTTPS + optional mTLS.
# cert_file/key_file can remain empty when provider-backed mTLS material is used.

key_provider: vault
vault_url: https://vault.company.net
vault_path: secret/data/acp/identities
vault_token_env: VAULT_TOKEN
allow_insecure_http: false
allow_insecure_tls: false
mtls_enabled: true
ca_file: /etc/acp/ca/enterprise-ca.pem
cert_file:
key_file:
