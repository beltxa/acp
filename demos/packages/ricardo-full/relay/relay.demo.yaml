# ACP John demo relay configuration.
# This file is documentation-first: the relay runtime reads environment variables
# (see demos/relay/.env.example and demos/scripts/start_demo.sh).

relay:
  name: acp-john-demo-relay
  host: 0.0.0.0
  port: 8080

  # Use HTTP for local/demo discovery lookups.
  discovery_scheme: http

  # Keep retries simple and visible for live troubleshooting.
  timeout_seconds: 5
  store_and_forward: true
  retry_interval_seconds: 2
  max_retry_attempts: 3
  retry_backoff_seconds: 2

  transports:
    direct_http: true
    amqp_fallback: false
    mqtt_fallback: false

inspection:
  enabled_commands:
    - acp relay status
    - acp relay health
    - acp relay registry list
    - acp relay registry show
    - acp relay routes show
    - acp relay ops stats
    - acp relay ops failures
